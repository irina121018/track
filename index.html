<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PRIDE</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0D0C0A;
    --card: #17150F;
    --card2: #1E1B13;
    --line: #2E2A1E;
    --gold: #E8A33D;
    --gold-soft: rgba(232, 163, 61, 0.13);
    --text: #F2EDE3;
    --muted: #99917F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Golos Text', -apple-system, sans-serif; }
  body { padding-bottom: 86px; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 16px; }
  .screen { display: none; }
  .screen.active { display: block; }

  header { padding: 22px 0 6px; display: flex; align-items: baseline; justify-content: space-between; }
  .brand { font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: 20px; letter-spacing: 0.14em; color: var(--gold); }
  .day-chip { font-size: 12.5px; font-weight: 600; color: var(--muted); }
  .month-line { font-size: 13px; color: var(--muted); margin-bottom: 16px; }

  .streak { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--line);
    border-radius: 16px; padding: 14px 16px; margin-bottom: 14px; }
  .flame { font-size: 30px; line-height: 1; filter: grayscale(1) opacity(0.45); }
  .streak.lit .flame { filter: none; }
  .streak-num { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 24px; }
  .streak-label { font-size: 12.5px; color: var(--muted); line-height: 1.4; }
  .week { margin-left: auto; display: flex; gap: 5px; }
  .wd { width: 9px; height: 9px; border-radius: 50%; background: var(--line); }
  .wd.full { background: var(--gold); box-shadow: 0 0 6px rgba(232,163,61,0.5); }
  .wd.part { background: var(--muted); }

  .sec-title { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin: 18px 2px 10px; }
  .proto { background: var(--card); border: 1px solid var(--line); border-radius: 16px; overflow: hidden; }
  .p-item { display: flex; align-items: flex-start; gap: 13px; padding: 14px 16px; cursor: pointer; border-bottom: 1px solid var(--line); }
  .p-item:last-child { border-bottom: none; }
  .p-item:active { background: rgba(255,255,255,0.03); }
  .p-item.special { background: var(--gold-soft); }
  .p-box { width: 24px; height: 24px; border-radius: 8px; border: 2px solid var(--line); flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; transition: all 0.18s ease; }
  .p-box svg { opacity: 0; transform: scale(0.4); transition: all 0.18s ease; }
  .p-item.done .p-box { background: var(--gold); border-color: var(--gold); }
  .p-item.done .p-box svg { opacity: 1; transform: scale(1); }
  .p-title { font-size: 15px; font-weight: 500; line-height: 1.35; }
  .p-item.done .p-title { color: var(--muted); }
  .p-desc { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.45; }
  .p-tag { display: inline-block; font-size: 10.5px; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }

  .day-status { text-align: center; font-size: 13px; color: var(--muted); padding: 12px 4px 2px; line-height: 1.5; }
  .day-status b { color: var(--gold); font-weight: 600; }

  .material { background: var(--card2); border: 1px solid var(--line); border-radius: 16px; padding: 15px 16px; margin-bottom: 10px; }
  .m-title { font-weight: 600; font-size: 14.5px; line-height: 1.4; }
  .m-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 11px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600;
    color: var(--gold); background: var(--gold-soft); border: none; border-radius: 999px;
    padding: 8px 14px; cursor: pointer; font-family: inherit; }
  .chip:active { opacity: 0.7; }

  .map-hero { display: flex; align-items: center; gap: 18px; background: var(--card); border: 1px solid var(--line);
    border-radius: 18px; padding: 16px; margin-bottom: 22px; }
  .ring { position: relative; width: 88px; height: 88px; flex-shrink: 0; }
  .ring svg { transform: rotate(-90deg); }
  .ring .track { stroke: var(--line); }
  .ring .fill { stroke: var(--gold); stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
  .ring .pct { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 16px; }
  .ring .pct small { font-family: 'Golos Text'; font-size: 10px; color: var(--muted); font-weight: 500; }
  .map-hero .big { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
  .map-hero .sub { font-size: 13px; color: var(--muted); line-height: 1.45; }

  .path { position: relative; padding-left: 38px; }
  .path::before { content: ""; position: absolute; left: 13px; top: 14px; bottom: 14px; width: 2px;
    background: repeating-linear-gradient(to bottom, var(--line) 0 6px, transparent 6px 12px); }
  .node-row { position: relative; margin-bottom: 13px; }
  .nd { position: absolute; left: -38px; top: 15px; width: 28px; height: 28px; border-radius: 50%;
    background: var(--bg); border: 2px solid var(--line); display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif; font-size: 11px; color: var(--muted); z-index: 1; }
  .node-row.active .nd { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 14px rgba(232,163,61,0.4); }
  .node-row.passed .nd { background: var(--gold); border-color: var(--gold); color: #14110A; }
  .node-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px 16px; }
  .node-row.active .node-card { border-color: rgba(232,163,61,0.45); }
  .n-title { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .n-sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; line-height: 1.45; }
  .n-bar { height: 4px; border-radius: 2px; background: var(--line); margin-top: 10px; overflow: hidden; }
  .n-bar i { display: block; height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.5s ease; }
  .node-row.locked .node-card { opacity: 0.62; }
  .lock { color: var(--muted); flex-shrink: 0; margin-left: auto; }

  .sign { position: fixed; inset: 0; background: var(--bg); z-index: 50; display: none; overflow-y: auto; }
  .sign.show { display: block; }
  .sign-inner { max-width: 480px; margin: 0 auto; padding: 48px 24px 40px; min-height: 100%;
    display: flex; flex-direction: column; }
  .sign-brand { font-family: 'Unbounded', sans-serif; font-weight: 900; font-size: 26px;
    letter-spacing: 0.14em; color: var(--gold); margin-bottom: 26px; }
  .sign h2 { font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 20px; line-height: 1.35; margin-bottom: 16px; }
  .sign p { font-size: 15px; line-height: 1.6; color: var(--muted); margin-bottom: 12px; }
  .sign p b { color: var(--text); font-weight: 600; }
  .sign-form { margin-top: auto; padding-top: 26px; }
  .sign input { width: 100%; background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    color: var(--text); font-family: inherit; font-size: 16px; padding: 15px 16px; outline: none; }
  .sign input:focus { border-color: var(--gold); }
  .sign-btn { width: 100%; margin-top: 12px; background: var(--gold); color: #14110A; border: none;
    border-radius: 14px; font-family: 'Unbounded', sans-serif; font-weight: 700; font-size: 14px;
    padding: 17px; cursor: pointer; letter-spacing: 0.02em; }
  .sign-btn:disabled { opacity: 0.4; }
  .sign-note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 12px; line-height: 1.5; }

  .tabs { position: fixed; left: 0; right: 0; bottom: 0; background: rgba(13,12,10,0.94);
    backdrop-filter: blur(12px); border-top: 1px solid var(--line); z-index: 20; }
  .tabs-inner { max-width: 560px; margin: 0 auto; display: flex; }
  .tab { flex: 1; background: none; border: none; color: var(--muted); font-family: inherit;
    font-size: 11.5px; font-weight: 600; padding: 11px 0 max(11px, env(safe-area-inset-bottom)); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .tab svg { display: block; }
  .tab.active { color: var(--gold); }

  .toast { position: fixed; left: 50%; bottom: 92px; transform: translateX(-50%) translateY(60px);
    background: var(--gold); color: #14110A; font-weight: 700; font-size: 14px;
    padding: 12px 22px; border-radius: 999px; opacity: 0; transition: all 0.4s ease; z-index: 60;
    box-shadow: 0 8px 28px rgba(232,163,61,0.4); white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand" id="brand"></div>
    <div class="day-chip" id="dayChip"></div>
  </header>
  <div class="month-line" id="monthLine"></div>

  <div class="screen active" id="screen-today">

      <div class="flame">🔥</div>

                  stroke-dasharray="238.76" stroke-dashoffset="238.76"/>

</div>

<div class="tabs">

    <button class="tab active" data-screen="today">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="4" width="14" height="13" rx="2.5" stroke="currentColor" stroke-width="1.7"/><path d="M3 8h14M7 2.5v3M13 2.5v3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M7 12l2 2 4-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Сегодня
    </button>
    <button class="tab" data-screen="map">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="4" r="2" stroke="currentColor" stroke-width="1.7"/><circle cx="5" cy="11" r="2" stroke="currentColor" stroke-width="1.7"/><circle cx="14" cy="16" r="2" stroke="currentColor" stroke-width="1.7"/><path d="M9 5.5L6 9.3M6.8 12.2l5.4 2.8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      Карта
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   ССЫЛКИ НА GOOGLE ТАБЛИЦУ (админка).
   В таблице 4 листа. Каждый публикуется отдельно:
   Файл → Поделиться → Опубликовать в интернете →
   выбрать лист → формат CSV → скопировать ссылку.

   Листы и их столбцы (первая строка — заголовки):

   «Настройки»: key | value
     month_id        — код месяца (m01, m02...). Смена кода =
                       у всех начинается новый месяц и новое
                       подписание протокола
     month_title     — название месяца
     duration_days   — длительность (30)
     min_to_close    — сколько пунктов закрывают день
                       (пусто или 0 = все пункты дня)
     active_node     — номер активного узла карты (1..6)
     late_cutoff_hour— после какого часа МСК подписание
                       переносит старт на завтра (20)
     sign_title, sign_text1..sign_text9, sign_button, sign_note
                     — тексты экрана подписания

   «Протокол»: id | title | desc | days
     days пусто      — пункт показывается каждый день
     days = 9        — только в день 9
     days = 15-18    — с 15 по 18 день
     days = 5,12,19  — в перечисленные дни

   «Узлы»: id | title | sub      (6 строк, по порядку)

   «Дни»: day | title | link_label | link_url
     Несколько строк с одним day = несколько ссылок.
     title достаточно указать в первой строке дня.
   ============================================================ */
const SHEETS = {
  settings: "",
  protocol: "",
  nodes:    "",
  days:     ""
};

/* Вебхук Apps Script для событий в таблицу команды.
   Пусто — ничего не отправляется. */
const EVENTS_URL = "";

/* ============================================================
   ЗАПАСНОЙ КОНТЕНТ — работает, пока таблица не подключена
   или временно недоступна. Правило прежнее:
   id опубликованных пунктов не менять.
   ============================================================ */
const CONFIG = {
  brand: "PRIDE",
  monthId: "m01",
  monthTitle: "Месяц 1 · Возврат тестостерона",
  durationDays: 30,
  minToClose: 0,            // 0 = все пункты дня
  lateCutoffHour: 20,       // подписал после 20:00 МСК → старт завтра
  activeIndex: 0,
  lockedLabel: "Откроется в свой месяц",

  protocol: [
    { id: "sleep",   title: "Сон: отбой до 23:00, 7–8 часов", desc: "Телефон — из спальни" },
    { id: "morning", title: "Утро вожака: первый час без телефона", desc: "Вода, движение, 10 минут дневного света" },
    { id: "iron",    title: "Железо: силовая по плану недели", desc: "3 базовые в неделю. В день отдыха — отметь за восстановление" },
    { id: "clean",   title: "Убрал: алкоголь, ночной скролл, порно", desc: "Сегодня — в ноль" },
    { id: "food",    title: "Еда: белок в каждый приём, без сахара и мусора" },
    { id: "move",    title: "Движение днём: шаги, воздух" },
    { id: "win",     title: "Выложи победу недели в чат", desc: "Как изменилось самочувствие — стая ждёт", days: "9" }
  ],

  nodes: [
    { id: "testo", title: "Тестостерон", sub: "Возврат энергии и тонуса" },
    { id: "money", title: "Добытчик",    sub: "Деньги и функция добычи" },
    { id: "node3", title: "Узел 3", sub: "" },
    { id: "node4", title: "Узел 4", sub: "" },
    { id: "node5", title: "Узел 5", sub: "" },
    { id: "node6", title: "Узел 6", sub: "" }
  ],

  daysContent: {
    1: { title: "Лекция 1 — «Тебя не состарили — тебя отключили»",
         links: [ { label: "▶ Смотреть лекцию", url: "https://example.com/l1" },
                  { label: "Гайд «Карта месяца»", url: "https://example.com/g1" } ] },
    2: { title: "Лекция 7 — «Утро вожака»",
         links: [ { label: "▶ Смотреть лекцию", url: "https://example.com/l7" },
                  { label: "Протокол первого часа", url: "https://example.com/g7" } ] }
  },

  sign: {
    title: "Протокол возврата тестостерона. 30 дней.",
    text: [
      "Это не «материалы почитать». Это конкретный чек-лист на каждый день: во сколько лёг, утро, железо, что убрал.",
      "Подписывая, ты берёшь обязательство <b>перед собой</b>. Слово мужика — это контракт, а не звук.",
      "Дальше — просто: каждый день закрываешь галочки. Цепочка дней решает, не геройство один раз."
    ],
    button: "Принимаю протокол на 30 дней",
    note: "После подписания запиши кружок-обещание в общий чат — стая должна видеть."
  }
};
/* ============== конец блока настройки ============== */

const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0D0C0A'); tg.setBackgroundColor('#0D0C0A'); }

/* ---------- Время: всё по Москве (UTC+3) ---------- */
function mskNow() { return new Date(Date.now() + 3 * 3600 * 1000); } // читать через getUTC*
function dstrUTC(d) {
  return d.getUTCFullYear() + "-" + String(d.getUTCMonth() + 1).padStart(2, "0") + "-" + String(d.getUTCDate()).padStart(2, "0");
}
function today() { return dstrUTC(mskNow()); }
function mskHour() { return mskNow().getUTCHours(); }
function dateFrom(s) { const p = s.split("-"); return new Date(Date.UTC(+p[0], +p[1] - 1, +p[2], 12)); }
function addDays(s, n) { const d = dateFrom(s); d.setUTCDate(d.getUTCDate() + n); return dstrUTC(d); }
function diffDays(a, b) { return Math.round((dateFrom(b) - dateFrom(a)) / 86400000); }

/* ---------- Хранилище ---------- */
let state = { name: "", signedAt: "", monthId: "", days: {} };
let memOnly = false;

function loadState(done) {
  if (tg && tg.CloudStorage) {
    tg.CloudStorage.getItem("pride", (err, val) => {
      if (!err && val) { try { state = Object.assign(state, JSON.parse(val)); } catch(e){} }
      done();
    });
  } else {
    try { const v = localStorage.getItem("pride_state"); if (v) state = Object.assign(state, JSON.parse(v)); }
    catch(e) { memOnly = true; }
    done();
  }
}
function saveState() {
  const v = JSON.stringify(state);
  if (tg && tg.CloudStorage) tg.CloudStorage.setItem("pride", v, () => {});
  else if (!memOnly) { try { localStorage.setItem("pride_state", v); } catch(e) { memOnly = true; } }
}

/* ---------- События для команды ---------- */
function sendEvent(type, extra) {
  if (!EVENTS_URL) return;
  const u = (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) || {};
  const payload = Object.assign({
    type, ts: new Date().toISOString(),
    user_id: u.id || "", username: u.username || "",
    name: state.name || "", month_id: state.monthId || CONFIG.monthId
  }, extra || {});
  try {
    fetch(EVENTS_URL, { method: "POST", mode: "no-cors",
      headers: { "Content-Type": "text/plain" }, body: JSON.stringify(payload) });
  } catch(e) {}
}

/* ---------- Загрузка из Google Таблицы ---------- */
function parseCSV(text) {
  const rows = []; let row = [], cell = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"') { if (text[i + 1] === '"') { cell += '"'; i++; } else inQuotes = false; }
      else cell += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(cell); cell = ""; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && text[i + 1] === '\n') i++;
        row.push(cell); rows.push(row); row = []; cell = "";
      } else cell += ch;
    }
  }
  if (cell !== "" || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function tableToObjects(rows) {
  if (rows.length < 2) return [];
  const head = rows[0].map(h => h.trim().toLowerCase());
  const out = [];
  for (let i = 1; i < rows.length; i++) {
    const o = {}; let empty = true;
    head.forEach((h, j) => {
      const v = (rows[i][j] || "").trim();
      o[h] = v; if (v) empty = false;
    });
    if (!empty) out.push(o);
  }
  return out;
}

function fetchCSV(url) {
  return fetch(url, { cache: "no-store" })
    .then(r => { if (!r.ok) throw new Error(); return r.text(); })
    .then(t => tableToObjects(parseCSV(t)));
}

function applySheets(done) {
  const jobs = [];
  if (SHEETS.settings) jobs.push(fetchCSV(SHEETS.settings).then(rows => {
    const kv = {};
    rows.forEach(r => { if (r.key) kv[r.key] = r.value; });
    if (kv.month_id) CONFIG.monthId = kv.month_id;
    if (kv.month_title) CONFIG.monthTitle = kv.month_title;
    if (kv.duration_days) CONFIG.durationDays = +kv.duration_days || CONFIG.durationDays;
    if (kv.min_to_close !== undefined && kv.min_to_close !== "") CONFIG.minToClose = +kv.min_to_close || 0;
    if (kv.active_node) CONFIG.activeIndex = Math.max(0, (+kv.active_node || 1) - 1);
    if (kv.late_cutoff_hour) CONFIG.lateCutoffHour = +kv.late_cutoff_hour;
    if (kv.locked_label) CONFIG.lockedLabel = kv.locked_label;
    if (kv.brand) CONFIG.brand = kv.brand;
    if (kv.sign_title) CONFIG.sign.title = kv.sign_title;
    const texts = [];
    for (let i = 1; i <= 9; i++) { if (kv["sign_text" + i]) texts.push(kv["sign_text" + i]); }
    if (texts.length) CONFIG.sign.text = texts;
    if (kv.sign_button) CONFIG.sign.button = kv.sign_button;
    if (kv.sign_note) CONFIG.sign.note = kv.sign_note;
  }).catch(() => {}));

  if (SHEETS.protocol) jobs.push(fetchCSV(SHEETS.protocol).then(rows => {
    const items = rows.filter(r => r.id && r.title).map(r => ({
      id: r.id, title: r.title, desc: r.desc || "", days: r.days || ""
    }));
    if (items.length) CONFIG.protocol = items;
  }).catch(() => {}));

  if (SHEETS.nodes) jobs.push(fetchCSV(SHEETS.nodes).then(rows => {
    const nodes = rows.filter(r => r.title).map(r => ({ id: r.id || r.title, title: r.title, sub: r.sub || "" }));
    if (nodes.length) CONFIG.nodes = nodes;
  }).catch(() => {}));

  if (SHEETS.days) jobs.push(fetchCSV(SHEETS.days).then(rows => {
    const dc = {};
    rows.forEach(r => {
      const d = +r.day;
      if (!d) return;
      if (!dc[d]) dc[d] = { title: "", links: [] };
      if (r.title && !dc[d].title) dc[d].title = r.title;
      if (r.link_url) dc[d].links.push({ label: r.link_label || "Открыть", url: r.link_url });
    });
    if (Object.keys(dc).length) CONFIG.daysContent = dc;
  }).catch(() => {}));

  if (!jobs.length) { done(); return; }
  Promise.allSettled(jobs).then(() => done());
}

/* ---------- Дни месяца ---------- */
function dayNumberOf(date) {
  if (!state.signedAt) return 0;
  const n = diffDays(state.signedAt, date) + 1;
  if (n < 1) return 0; // подписал вечером — день 0, отсчёт с полуночи МСК
  return Math.min(CONFIG.durationDays, n);
}
function dayNumber() { return dayNumberOf(today()); }

/* Какие пункты протокола действуют в конкретный день месяца */
function matchesDaySpec(spec, dn) {
  if (!spec) return true;
  return String(spec).split(",").some(part => {
    part = part.trim();
    if (!part) return false;
    if (part.includes("-")) {
      const [a, b] = part.split("-").map(x => +x.trim());
      return dn >= a && dn <= b;
    }
    return +part === dn;
  });
}
function itemsFor(date) {
  const dn = dayNumberOf(date);
  return CONFIG.protocol.filter(p => !p.days || (dn > 0 && matchesDaySpec(p.days, dn)));
}

/* ---------- Закрытие дня и streak ---------- */
function checksOn(date) { return state.days[date] || {}; }
function countOn(date) {
  const c = checksOn(date); let n = 0;
  itemsFor(date).forEach(p => { if (c[p.id]) n++; });
  return n;
}
function needFor(date) {
  const total = itemsFor(date).length;
  if (!total) return Infinity;
  return CONFIG.minToClose > 0 ? Math.min(CONFIG.minToClose, total) : total;
}
function isClosed(date) { return countOn(date) >= needFor(date); }

function streak() {
  let s = 0;
  let d = isClosed(today()) ? today() : addDays(today(), -1);
  while (isClosed(d)) { s++; d = addDays(d, -1); }
  return s;
}
function daysClosedTotal() {
  if (!state.signedAt) return 0;
  let n = 0;
  for (const date in state.days) {
    if (date >= state.signedAt && isClosed(date)) n++;
  }
  return n;
}

/* ---------- Отрисовка: Сегодня ---------- */
const CHECK_SVG = '<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 7l3 3 6-7" stroke="#14110A" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function plural(n, one, few, many) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return one;
  if (m10 >= 2 && m10 <= 4 && (m100 < 12 || m100 > 14)) return few;
  return many;
}

function renderToday() {
  document.getElementById("brand").textContent = CONFIG.brand;
  document.getElementById("monthLine").textContent = CONFIG.monthTitle;

  const dn = dayNumber();
  document.getElementById("dayChip").textContent =
    !state.signedAt ? "" :
    dn === 0 ? "Старт — завтра 00:00 МСК" :
    "День " + dn + " из " + CONFIG.durationDays;

  const s = streak();
  document.getElementById("streakNum").textContent = s;
  document.getElementById("streakLabel").textContent = plural(s, "день подряд", "дня подряд", "дней подряд");
  document.getElementById("streakBox").classList.toggle("lit", s > 0);

  const wd = document.getElementById("weekDots"); wd.innerHTML = "";
  for (let i = 6; i >= 0; i--) {
    const date = addDays(today(), -i);
    const el = document.createElement("div");
    el.className = "wd" + (isClosed(date) ? " full" : (countOn(date) > 0 ? " part" : ""));
    wd.appendChild(el);
  }

  const t = today(), checks = checksOn(t);
  const list = document.getElementById("protoList"); list.innerHTML = "";
  itemsFor(t).forEach(p => {
    const div = document.createElement("div");
    div.className = "p-item" + (checks[p.id] ? " done" : "") + (p.days ? " special" : "");
    div.dataset.pid = p.id;
    div.innerHTML = '<div class="p-box">' + CHECK_SVG + '</div>' +
      '<div>' + (p.days ? '<div class="p-tag">Задача дня</div>' : '') +
      '<div class="p-title">' + p.title + '</div>' +
      (p.desc ? '<div class="p-desc">' + p.desc + '</div>' : '') + '</div>';
    list.appendChild(div);
  });

  const n = countOn(t), need = needFor(t), total = itemsFor(t).length;
  const st = document.getElementById("dayStatus");
  if (dn === 0 && state.signedAt) {
    st.innerHTML = "Протокол принят. Отсчёт 30 дней начнётся в полночь по Москве — а пока можно закрыть первые галочки для разгона.";
  } else if (isClosed(t)) {
    st.innerHTML = "<b>День закрыт.</b> Цепочка растёт — завтра не рви.";
  } else {
    st.innerHTML = "Закрыто " + n + " из " + total +
      (need < total ? " · день засчитается от " + need : "") + ". День закрывает не геройство, а галочки.";
  }

  const mat = dn > 0 ? CONFIG.daysContent[dn] : null;
  const matBox = document.getElementById("materials"), matT = document.getElementById("matTitle");
  if (mat) {
    matT.style.display = "block";
    let h = '<div class="material"><div class="m-title">' + mat.title + '</div>';
    if (mat.links && mat.links.length) {
      h += '<div class="m-links">';
      mat.links.forEach(l => { h += '<button class="chip" data-url="' + l.url + '">' + l.label + '</button>'; });
      h += '</div>';
    }
    h += '</div>';
    matBox.innerHTML = h;
  } else {
    matT.style.display = "none"; matBox.innerHTML = "";
  }
}

/* ---------- Отрисовка: Карта ---------- */
function renderMap() {
  const closed = daysClosedTotal();
  const total = CONFIG.durationDays;
  document.getElementById("ringDays").textContent = closed;
  document.getElementById("ringTotal").textContent = total;
  const C = 238.76;
  document.getElementById("ringFill").style.strokeDashoffset = C - C * Math.min(1, closed / total);

  const active = CONFIG.nodes[CONFIG.activeIndex];
  document.getElementById("mapBig").textContent = active ? ("В работе: " + active.title) : "";

  const path = document.getElementById("nodesPath"); path.innerHTML = "";
  CONFIG.nodes.forEach((nd, i) => {
    const isActive = i === CONFIG.activeIndex;
    const isPassed = i < CONFIG.activeIndex;
    const row = document.createElement("div");
    row.className = "node-row" + (isActive ? " active" : (isPassed ? " passed" : " locked"));
    const pct = isActive ? Math.round(Math.min(1, closed / total) * 100) : 0;
    row.innerHTML = '<div class="nd">' + (isPassed ? "✓" : (i + 1)) + '</div>' +
      '<div class="node-card">' +
        '<div class="n-title">' + nd.title +
          (isActive || isPassed ? "" : '<svg class="lock" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2.5" y="6" width="9" height="6.5" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M4.5 6V4.5a2.5 2.5 0 015 0V6" stroke="currentColor" stroke-width="1.5"/></svg>') +
        '</div>' +
        '<div class="n-sub">' + (isActive ? ((nd.sub ? nd.sub + " · " : "") + "закрыто дней: " + closed + " из " + total)
                               : (isPassed ? "Узел пройден" : CONFIG.lockedLabel)) + '</div>' +
        (isActive ? '<div class="n-bar"><i style="width:' + pct + '%"></i></div>' : '') +
      '</div>';
    path.appendChild(row);
  });
}

/* ---------- Подписание ---------- */
function renderSign() {
  const s = CONFIG.sign;
  document.getElementById("signBrand").textContent = CONFIG.brand;
  document.getElementById("signTitle").textContent = s.title;
  document.getElementById("signText").innerHTML = s.text.map(p => "<p>" + p + "</p>").join("");
  document.getElementById("signBtn").textContent = s.button;
  document.getElementById("signNote").textContent = s.note;
  if (state.name) {
    document.getElementById("signName").value = state.name;
    document.getElementById("signBtn").disabled = false;
  }
  document.getElementById("sign").classList.add("show");
}

document.getElementById("signName").addEventListener("input", e => {
  document.getElementById("signBtn").disabled = e.target.value.trim().length < 2;
});
document.getElementById("signBtn").addEventListener("click", () => {
  const name = document.getElementById("signName").value.trim();
  if (name.length < 2) return;
  state.name = name;
  state.monthId = CONFIG.monthId;
  const late = mskHour() >= CONFIG.lateCutoffHour;
  state.signedAt = late ? addDays(today(), 1) : today();
  saveState();
  sendEvent("protocol_signed", { starts: state.signedAt, late: late ? 1 : 0 });
  document.getElementById("sign").classList.remove("show");
  if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
  toast(late ? name + ", принято. День 1 — с полуночи МСК." : name + ", протокол принят. День 1 — сегодня.");
  renderAll();
});

/* ---------- Тост ---------- */
let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

/* ---------- Клики ---------- */
document.getElementById("protoList").addEventListener("click", e => {
  const item = e.target.closest(".p-item");
  if (!item) return;
  const t = today();
  if (!state.days[t]) state.days[t] = {};
  const id = item.dataset.pid;
  const wasClosed = isClosed(t);
  state.days[t][id] = !state.days[t][id];
  if (!state.days[t][id]) delete state.days[t][id];
  saveState();
  if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred("light");
  const nowClosed = isClosed(t);
  renderToday();
  if (nowClosed && !wasClosed) {
    const checked = itemsFor(t).filter(p => checksOn(t)[p.id]).map(p => p.id).join(",");
    sendEvent("day_closed", { date: t, day_number: dayNumber(), streak: streak(), checked });
    toast("День закрыт. 🔥 " + streak());
    if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
    renderMap();
  }
});

document.getElementById("materials").addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if (!chip) return;
  const url = chip.dataset.url;
  if (tg && tg.openLink) tg.openLink(url); else window.open(url, "_blank");
});

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("screen-" + tab.dataset.screen).classList.add("active");
  });
});

/* ---------- Запуск ---------- */
function renderAll() { renderToday(); renderMap(); }
applySheets(() => loadState(() => {
  renderAll();
  /* Нет подписи или в таблице сменился month_id → новое подписание */
  if (!state.signedAt || state.monthId !== CONFIG.monthId) renderSign();
}));
</script>
